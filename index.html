<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คิดถึงพ่อ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p-pink: #ff8fa3; --s-pink: #fff0f3; --accent: #ff4d6d; }
        * { box-sizing: border-box; }
        body { font-family: 'Prompt', sans-serif; background: var(--s-pink); margin: 0; color: #592d38; }
        #canvas-sakura { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .wrapper { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; padding: 30px 15px; }
        .header { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 30px; border: 1px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { margin: 0; color: var(--accent); font-size: 1.8rem; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .item { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .item img { width: 100%; height: 280px; object-fit: cover; display: block; }
        .item-info { padding: 12px; font-size: 0.9rem; border-top: 1px solid #f0f0f0; }
        .name-tag { color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>
    <canvas id="canvas-sakura"></canvas>
    <div class="wrapper">
        <div class="header">
            <h1>รักพ่อมาก</h1>
            <p style="opacity:0.6;font-size:0.9rem">คิดถึงพ่อมาก</p>
        </div>
        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        const cvs = document.getElementById('canvas-sakura');
        const ctx = cvs.getContext('2d');
        let pts = [];
        const resize = () => { cvs.width = window.innerWidth; cvs.height = window.innerHeight; };
        window.addEventListener('resize', resize); resize();
        class P {
            constructor() { this.x = Math.random()*cvs.width; this.y = Math.random()*cvs.height-cvs.height; this.sz = Math.random()*6+4; this.sp = Math.random()*2+1; this.a = Math.random()*360; }
            draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.a*Math.PI/180); ctx.beginPath(); ctx.ellipse(0,0,this.sz,this.sz/2,0,0,Math.PI*2); ctx.fillStyle='#ffb7c5'; ctx.fill(); ctx.restore(); }
            update() { this.y+=this.sp; this.a+=0.05; if(this.y>cvs.height){ this.y=-10; this.x=Math.random()*cvs.width; } }
        }
        for(let i=0; i<35; i++) pts.push(new P());
        function anim() { ctx.clearRect(0,0,cvs.width,cvs.height); pts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(anim); }
        anim();

        async function getPhotos() {
            const user = 'oyuyfy7ff';
            const repo = 'Project007';
            const g = document.getElementById('gallery');
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/images`);
                const data = await res.json();
                if(!Array.isArray(data)) return;
                data.reverse().forEach(f => {
                    if(f.name.match(/\.(jpg|jpeg|png|webp)$/i)) {
                        const splitName = f.name.split('-');
                        const uploader = splitName.length > 1 ? decodeURIComponent(splitName[0]) : "คิดถึงพ่อมากๆ";
                        const note = splitName.length > 1 ? decodeURIComponent(splitName[1].split('.')[0]) : "";
                        g.innerHTML += `
                            <div class="item">
                                <img src="${f.download_url}" loading="lazy">
                                <div class="item-info">
                                    <span class="name-tag">โดย: ${uploader}</span><br>
                                    <span style="font-size:0.8rem; opacity:0.7">${note}</span>
                                </div>
                            </div>`;
                    }
                });
            } catch(e) { console.log("Error or No images"); }
        }
        getPhotos();
    </script>
</body>
</html>
