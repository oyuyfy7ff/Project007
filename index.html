<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คิดถึงพ่อมาก</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-pink: #ff8fa3;
            --s-pink: #fff0f3;
            --accent: #ff4d6d;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            font-family: 'Prompt', sans-serif;
            background: var(--s-pink);
            margin: 0;
            color: #592d38;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ระบบดอกไม้ร่วงขั้นสูง (Canvas) */
        #canvas-sakura {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .main-wrapper {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ส่วนหัวแบบ Glassmorphism */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(255, 143, 163, 0.1);
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { font-weight: 600; font-size: 2.2rem; color: var(--accent); margin: 0; letter-spacing: -1px; }
        .quote { font-weight: 200; opacity: 0.7; margin-top: 10px; }

        /* โซนอัปโหลดสุดโหด (Drop Zone) */
        .upload-zone {
            margin-top: 30px;
            border: 2px dashed var(--p-pink);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.5);
        }
        .upload-zone:hover { background: #fff9fa; border-color: var(--accent); }
        .upload-zone.dragover { background: var(--p-pink); color: white; }

        /* แกลเลอรีแบบ Masonry Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            position: relative;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: cover; display: block; }

        /* ปุ่มดาวน์โหลดง่ายๆ */
        .btn-download {
            position: absolute;
            bottom: 10px; right: 10px;
            background: var(--accent);
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }

        #status { display: none; margin-top: 15px; font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>

    <canvas id="canvas-sakura"></canvas>

    <div class="main-wrapper">
        <div class="glass-panel">
            <h1>บันทึกความทรงจำแด่คุณพ่อ</h1>
            <div class="quote">ความรักจะคงอยู่ตลอดไปในทุกรูปภาพ</div>
            
            <div class="upload-zone" id="dropZone">
                <p id="uploadText">ลากรูปมาวางที่นี่ หรือ คลิกเพื่อเลือกรูป</p>
                <input type="file" id="fileInput" accept="image/*" style="display:none">
                <div id="status">กำลังประมวลผลระบบฐานข้อมูล...</div>
            </div>
        </div>

        <div class="gallery-grid" id="gallery"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <script>
        // 1. ระบบซากุระร่วงแบบซับซ้อน (Canvas Engine)
        const canvas = document.getElementById('canvas-sakura');
        const ctx = canvas.getContext('2d');
        let petals = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Petal {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 7 + 5;
                this.speed = Math.random() * 2 + 1;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 0.2 - 0.1;
                this.wind = Math.random() * 1 - 0.5;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size/2, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#ffb7c5';
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                this.angle += this.spin;
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }
        }

        for (let i = 0; i < 40; i++) petals.push(new Petal());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // 2. ระบบ Firebase และการจัดการรูปภาพ
        const firebaseConfig = {
            apiKey: "AIzaSyBE3VhMO0-brsBM4fv1lI-D331me8ZPuJU",
            authDomain: "oatza-88e5f.firebaseapp.com",
            projectId: "oatza-88e5f",
            storageBucket: "oatza-88e5f.firebasestorage.app",
            messagingSenderId: "265747109009",
            appId: "1:265747109009:web:6fc746d6c042f6383d1b30",
            measurementId: "G-1JEPW4PCVQ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const gallery = document.getElementById('gallery');

        // คลิกเพื่อเลือกไฟล์
        dropZone.addEventListener('click', () => fileInput.click());

        // ลากไฟล์มาวาง
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleUpload(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => handleUpload(e.target.files[0]));

        async function handleUpload(file) {
            if (!file) return;
            status.style.display = 'block';
            try {
                const name = Date.now() + '-' + file.name;
                const ref = storage.ref('pro_memories/' + name);
                await ref.put(file);
                const url = await ref.getDownloadURL();
                await db.collection("pro_v1").add({ url, time: firebase.firestore.FieldValue.serverTimestamp() });
                alert('อัปโหลดสำเร็จ');
            } catch (err) { alert('ข้อผิดพลาดระบบ'); }
            finally { status.style.display = 'none'; }
        }

        // ระบบดึงข้อมูลและปุ่มดาวน์โหลด
        db.collection("pro_v1").orderBy("time", "desc").onSnapshot(snap => {
            gallery.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${data.url}" loading="lazy">
                    <a href="${data.url}" target="_blank" download="memory.jpg" class="btn-download">ดาวน์โหลด</a>
                `;
                gallery.appendChild(div);
            });
        });
    </script>
</body>
</html>
